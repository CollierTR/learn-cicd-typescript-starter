name: deployment

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # REQUIRED for OIDC

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/216160978397/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'cloud-run-deployer@notely-495517.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-495517/notely-ar-repo/notely:latest --service-account=projects/notely-495517/serviceAccounts/cloud-run-deployer@notely-495517.iam.gserviceaccount.com --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET .

